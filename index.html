play:block;font-size:13px;font-weight:700;color:#374151;margin-bottom:6px}.form{display:grid;gap:12px}.two{grid-template-columns:1fr 1fr}.auth{max-width:560px;margin:48px auto}.notice{border-radius:16px;padding:13px 14px;font-size:14px;line-height:1.45;margin-bottom:14px}.warn{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-line)}.redbox{background:var(--red-bg);color:var(--red);border:1px solid var(--red-line)}.greenbox{background:var(--green-bg);color:var(--green);border:1px solid var(--green-line)}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 16px}.tab{border:1px solid var(--line);background:#fff;color:var(--dark);padding:10px 13px;border-radius:999px;font-weight:800}.tab.active{background:var(--dark);color:#fff;border-color:var(--dark)}.datebar{display:grid;grid-template-columns:180px 180px minmax(0,1fr) 180px;gap:10px;align-items:end;margin-bottom:18px}.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}.stat{background:#fff;border:1px solid #eef0f3;border-radius:18px;padding:14px;box-shadow:0 8px 18px rgba(15,23,42,.05)}.stat span{display:block;color:var(--muted);font-size:12px;margin-bottom:5px}.stat strong{font-size:26px;letter-spacing:-.04em}.toolbar{display:grid;grid-template-columns:minmax(0,1fr) 170px 170px 170px;gap:10px;margin-bottom:18px}.scroll-panel{max-height:465px;overflow-y:auto;padding-right:6px}.scroll-panel.short{max-height:315px}.party-list,.attendee-list{display:grid;gap:10px}.party-card{border:1px solid #eef0f3;background:#fff;border-radius:20px;padding:14px;cursor:pointer;transition:.16s}.party-card:hover{transform:translateY(-1px);box-shadow:0 10px 22px rgba(15,23,42,.08)}.party-card.selected{border-color:#111827}.party-card.complete{border-color:var(--green-line);background:#fbfffd}.party-card.started{border-color:var(--amber-line)}.party-title{margin:0 0 6px;font-size:18px}.party-meta,.row-actions,.name-line{display:flex;flex-wrap:wrap;gap:7px;align-items:center}.attendee-row{display:grid;grid-template-columns:42px minmax(0,1fr) auto;gap:12px;align-items:center;padding:12px;border:1px solid #eef0f3;border-radius:18px;background:#fff}.attendee-row.checked{background:var(--green-bg);border-color:var(--green-line)}.attendee-check{width:28px;height:28px;border-radius:9px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-weight:900;background:#fff;color:#fff}.attendee-row.checked .attendee-check{background:var(--green);border-color:var(--green);color:#fff}.attendee-name{margin:0;font-weight:800;font-size:16px}.attendee-detail{margin:2px 0 0;color:var(--muted);font-size:13px}.badge,.count-pill{border:1px solid var(--line);border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800;white-space:nowrap;background:#fff}.general{background:#f3f4f6;color:#374151}.vip{background:#f5f3ff;color:#6d28d9;border-color:#ddd6fe}.bottle{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}.remaining{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-line)}.in{background:var(--green-bg);color:var(--green);border-color:var(--green-line)}.blocked{background:var(--red-bg);color:var(--red);border-color:var(--red-line)}table{width:100%;border-collapse:collapse;font-size:14px}th,td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em}.modal-backdrop{position:fixed;inset:0;background:rgba(17,24,39,.52);z-index:50;display:flex;align-items:center;justify-content:center;padding:18px}.modal{max-width:800px;width:100%;max-height:92vh;overflow:auto;background:#fff;border-radius:26px;box-shadow:0 22px 60px rgba(0,0,0,.22);padding:22px}

<script>
const SUPABASE_URL = "https://wdlgkwzowapzhurbbavf.supabase.co";
const SUPABASE_PUBLIC_KEY = "sb_publishable_FiasS5c034YR4w_72bBUqQ_dzcCJ5ME";
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLIC_KEY);
const roles={admin:{label:"Admin",door:true,manage:true,reports:true},manager:{label:"Management",door:true,manage:true,reports:true},door:{label:"Door Staff",door:true,manage:false,reports:false},viewer:{label:"Viewer",door:false,manage:false,reports:true}};
const days=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const partyTypes=["Bottle Service","VIP Party","Private Party","Staff Party","Vendor Group"];
const guestTypes=["Guest","VIP","Comp","Host","Birthday","Bottle Service","Staff","Vendor","Do Not Admit"];
const sortOptions=[["LAST_ASC","Last Name A-Z"],["LAST_DESC","Last Name Z-A"],["FIRST_ASC","First Name A-Z"],["FIRST_DESC","First Name Z-A"],["UNCHECKED","Unchecked First"],["CHECKED","Checked First"]];
let auth={session:null,currentUser:null,profile:null};
let state={loading:false,error:"",venue:null,serviceDay:null,groups:[],guests:[],logs:[],view:"door",activeDate:todayISO(),activeDay:dayNameFromDate(todayISO()),selectedGroupId:null,currentMode:"GENERAL",searchText:"",partySearchText:"",sortMode:"LAST_ASC",doorLocation:"Front Door",modal:null,editingGroupId:null,editingGuestId:null,importMessage:""};
let realtimeChannel=null;
function todayISO(){return new Date().toISOString().slice(0,10)}
function dayNameFromDate(d){const x=new Date(d+"T12:00:00"),j=x.getDay();return days[j===0?6:j-1]}
function nextDateForDay(day){const t=days.indexOf(day),now=new Date(),c=now.getDay()===0?6:now.getDay()-1,o=(t-c+7)%7,r=new Date(now);r.setDate(now.getDate()+o);return r.toISOString().slice(0,10)}
function esc(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function currentUser(){return auth.currentUser}
function perms(){return currentUser()?roles[currentUser().role]:null}
function requirePerm(p){if(!perms()||!perms()[p]){alert("This account does not have access to that function.");return false}return true}
function roleLabel(r){return roles[r]?.label||r}
function capFocus(){const a=document.activeElement;if(!a||!a.id||!(a.tagName==="INPUT"||a.tagName==="TEXTAREA"))return null;return{id:a.id,start:a.selectionStart,end:a.selectionEnd}}
function resFocus(f){if(!f)return;requestAnimationFrame(()=>{const e=document.getElementById(f.id);if(e){e.focus();try{e.setSelectionRange(f.start,f.end)}catch{}}})}
function capScroll(){const o={};["attendeeScrollPanel","partyScrollPanel","reportScrollPanel"].forEach(id=>{const e=document.getElementById(id);if(e)o[id]=e.scrollTop});return o}
function resScroll(o){requestAnimationFrame(()=>Object.keys(o||{}).forEach(id=>{const e=document.getElementById(id);if(e)e.scrollTop=o[id]}))}
function render(){const f=capFocus(),s=capScroll(),root=document.getElementById("app");if(!auth.currentUser){root.innerHTML=renderLogin();resFocus(f);return}root.innerHTML=renderApp();resFocus(f);resScroll(s)}
async function runDb(label,fn){try{state.error="";return await fn()}catch(e){console.error(e);state.error=label+" failed: "+(e.message||e);render();throw e}}
function must(data,error){if(error)throw error;return data}
async function initAuth(){
  const {data,error}=await db.auth.getSession();
  if(error){state.error=error.message;render();return}
  auth.session=data.session||null;
  if(auth.session?.user){await loadStaffProfile(auth.session.user)}
  db.auth.onAuthStateChange(async (_event,session)=>{
    auth.session=session||null;
    if(session?.user){await loadStaffProfile(session.user);await bootDatabase()}
    else{auth.currentUser=null;auth.profile=null;render()}
  });
  render();
  if(auth.currentUser) await bootDatabase();
}
async function loadStaffProfile(user){
  const {data,error}=await db.from("staff_profiles").select("*").eq("id",user.id).maybeSingle();
  if(error){state.error=error.message;auth.currentUser=null;auth.profile=null;render();return}
  if(!data){state.error="This Supabase Auth user has not been added to DoorFlow staff_profiles yet.";auth.currentUser=null;auth.profile=null;render();return}
  if(!data.active){state.error="This DoorFlow account is inactive.";auth.currentUser=null;auth.profile=null;render();return}
  auth.profile=data;
  auth.currentUser={id:user.id,email:user.email,name:data.full_name,role:data.role,active:data.active};
  state.error="";
  state.view=roles[data.role].door?"door":"reports";
  render();
}
async function login(e){
  e.preventDefault();
  const f=new FormData(e.target),email=String(f.get("email")||"").trim(),password=String(f.get("password")||"");
  if(!email||!password){alert("Email and password are required.");return}
  const {data,error}=await db.auth.signInWithPassword({email,password});
  if(error){state.error=error.message;render();return}
  auth.session=data.session;
  await loadStaffProfile(data.user);
  await bootDatabase();
}
async function logout(){
  try{
    await db.auth.signOut({scope:"local"});
  }catch(error){
    console.warn("Supabase signOut warning:",error);
  }

  auth.session=null;
  auth.currentUser=null;
  auth.profile=null;

  state.groups=[];
  state.guests=[];
  state.logs=[];
  state.selectedGroupId=null;
  state.currentMode="GENERAL";
  state.searchText="";
  state.partySearchText="";
  state.modal=null;
  state.error="";

  Object.keys(localStorage).forEach((key)=>{
    if(key.startsWith("sb-")||key.includes("supabase")){
      localStorage.removeItem(key);
    }
  });

  render();
}

async function bootDatabase(){if(!auth.currentUser)return;await loadDataForDate(state.activeDate);subscribeRealtime()}
async function ensureVenue(){let r=await db.from("venues").select("*").eq("name","EVE").maybeSingle();if(r.error)throw r.error;if(r.data)return r.data;r=await db.from("venues").insert({name:"EVE"}).select("*").single();return must(r.data,r.error)}
async function ensureServiceDay(date){const venue=await ensureVenue(),dayName=dayNameFromDate(date);let r=await db.from("service_days").select("*").eq("venue_id",venue.id).eq("service_date",date).maybeSingle();if(r.error)throw r.error;if(!r.data){r=await db.from("service_days").insert({venue_id:venue.id,service_date:date,day_name:dayName}).select("*").single();r.data=must(r.data,r.error)}state.venue=venue;state.serviceDay=r.data;return r.data}
async function ensureGeneralGroup(service_day_id){let r=await db.from("groups").select("*").eq("service_day_id",service_day_id).eq("name","General Guest List").maybeSingle();if(r.error)throw r.error;if(r.data)return r.data;r=await db.from("groups").insert({service_day_id,name:"General Guest List",group_type:"General Guest List",host_name:"Door List",table_location:"Front Door",approved_by:"Management",notes:"Master guest list for this date.",status:"Active"}).select("*").single();return must(r.data,r.error)}
async function loadDataForDate(date){return runDb("Loading live data",async()=>{state.loading=true;render();state.activeDate=date;state.activeDay=dayNameFromDate(date);const sd=await ensureServiceDay(date);await ensureGeneralGroup(sd.id);let r=await db.from("groups").select("*").eq("service_day_id",sd.id).order("created_at",{ascending:false});state.groups=must(r.data,r.error)||[];const ids=state.groups.map(g=>g.id);if(ids.length){r=await db.from("guests").select("*").in("group_id",ids).order("last_name",{ascending:true});state.guests=must(r.data,r.error)||[];r=await db.from("check_in_logs").select("*").in("group_id",ids).order("created_at",{ascending:false}).limit(200);state.logs=must(r.data,r.error)||[]}else{state.guests=[];state.logs=[]}if(!selectedGroup()&&specificGroups()[0])state.selectedGroupId=specificGroups()[0].id;state.loading=false;render()})}
function subscribeRealtime(){if(realtimeChannel)db.removeChannel(realtimeChannel);realtimeChannel=db.channel("doorflow-live").on("postgres_changes",{event:"*",schema:"public",table:"guests"},()=>loadDataForDate(state.activeDate)).on("postgres_changes",{event:"*",schema:"public",table:"groups"},()=>loadDataForDate(state.activeDate)).on("postgres_changes",{event:"*",schema:"public",table:"check_in_logs"},()=>loadDataForDate(state.activeDate)).subscribe()}
function generalGroup(){return state.groups.find(g=>g.name==="General Guest List"||g.group_type==="General Guest List")||null}
function specificGroups(){return state.groups.filter(g=>!(g.name==="General Guest List"||g.group_type==="General Guest List"))}
function selectedGroup(){const s=state.groups.find(g=>g.id===state.selectedGroupId);if(s&&!(s.name==="General Guest List"||s.group_type==="General Guest List"))return s;return specificGroups()[0]||null}
function guestsForGroup(id){return state.guests.filter(g=>g.group_id===id)}
function guestTotal(g){return Math.max(1,Number(g.total_allowed||1))}
function guestChecked(g){return Math.max(0,Math.min(guestTotal(g),Number(g.checked_in_count||0)))}
function guestRemaining(g){return Math.max(0,guestTotal(g)-guestChecked(g))}
function isGuestFullyIn(g){return guestChecked(g)>=guestTotal(g)}
function groupStats(id){const guests=guestsForGroup(id);return{total:guests.reduce((s,g)=>s+guestTotal(g),0),checked:guests.reduce((s,g)=>s+guestChecked(g),0),remaining:guests.reduce((s,g)=>s+guestRemaining(g),0)}}
function dayStats(){return{groups:state.groups.length,total:state.guests.reduce((s,g)=>s+guestTotal(g),0),checked:state.guests.reduce((s,g)=>s+guestChecked(g),0),remaining:state.guests.reduce((s,g)=>s+guestRemaining(g),0),completeGroups:specificGroups().filter(g=>{const x=groupStats(g.id);return x.total>0&&x.remaining===0}).length}}
function sortGuests(list){const last=g=>(g.last_name+" "+g.first_name).toLowerCase(),first=g=>(g.first_name+" "+g.last_name).toLowerCase();if(state.sortMode==="LAST_ASC")return list.sort((a,b)=>last(a).localeCompare(last(b)));if(state.sortMode==="LAST_DESC")return list.sort((a,b)=>last(b).localeCompare(last(a)));if(state.sortMode==="FIRST_ASC")return list.sort((a,b)=>first(a).localeCompare(first(b)));if(state.sortMode==="FIRST_DESC")return list.sort((a,b)=>first(b).localeCompare(first(a)));if(state.sortMode==="UNCHECKED")return list.sort((a,b)=>Number(isGuestFullyIn(a))-Number(isGuestFullyIn(b))||last(a).localeCompare(last(b)));if(state.sortMode==="CHECKED")return list.sort((a,b)=>Number(isGuestFullyIn(b))-Number(isGuestFullyIn(a))||last(a).localeCompare(last(b)));return list}
function visibleGuests(){const src=state.currentMode==="GENERAL"?state.guests:(selectedGroup()?guestsForGroup(selectedGroup().id):[]),q=state.searchText.trim().toLowerCase();return sortGuests(src.filter(g=>{const group=state.groups.find(x=>x.id===g.group_id),txt=group?group.name+" "+group.group_type+" "+(group.host_name||""):"";return !q||(g.first_name+" "+g.last_name+" "+g.guest_type+" "+(g.notes||"")+" "+txt).toLowerCase().includes(q)}))}
function visibleGroups(){const q=state.partySearchText.trim().toLowerCase();return specificGroups().filter(g=>!q||(g.name+" "+g.group_type+" "+(g.host_name||"")+" "+(g.table_location||"")+" "+(g.notes||"")).toLowerCase().includes(q))}
function typeClass(t){const v=String(t||"").toLowerCase();if(v.includes("bottle"))return"bottle";if(v.includes("vip"))return"vip";if(v.includes("do not"))return"blocked";return"general"}
async function setActiveDay(day){await loadDataForDate(nextDateForDay(day))}
async function setActiveDate(date){await loadDataForDate(date)}
function selectGroup(id){state.selectedGroupId=id;state.currentMode="GROUP";state.searchText="";render()}
function setMode(mode){state.currentMode=mode;state.searchText="";render()}
async function checkInOneGuest(id){if(!requirePerm("door"))return;const g=state.guests.find(x=>x.id===id);if(!g)return;if(g.guest_type==="Do Not Admit"){alert("This guest is marked Do Not Admit. Contact management.");return}if(guestRemaining(g)<=0)return;const newCount=guestChecked(g)+1,u=currentUser(),nowIso=new Date().toISOString();await runDb("Check in",async()=>{let r=await db.from("guests").update({checked_in_count:newCount,last_checked_in_at:nowIso,last_checked_in_by_name:u.name,last_door_location:state.doorLocation}).eq("id",id);must(r.data,r.error);r=await db.from("check_in_logs").insert({guest_id:g.id,group_id:g.group_id,action:"Check In 1",amount:1,door_location:state.doorLocation,staff_name:u.name});must(r.data,r.error);g.checked_in_count=newCount;g.last_checked_in_at=nowIso;g.last_checked_in_by_name=u.name;g.last_door_location=state.doorLocation;render()})}
async function undoOneGuest(id){if(!requirePerm("door"))return;const g=state.guests.find(x=>x.id===id);if(!g)return;const checked=guestChecked(g);if(checked<=0)return;const newCount=checked-1,u=currentUser();await runDb("Undo check-in",async()=>{let r=await db.from("guests").update({checked_in_count:newCount,last_checked_in_at:newCount>0?g.last_checked_in_at:null,last_checked_in_by_name:newCount>0?g.last_checked_in_by_name:null,last_door_location:newCount>0?g.last_door_location:null}).eq("id",id);must(r.data,r.error);r=await db.from("check_in_logs").insert({guest_id:g.id,group_id:g.group_id,action:"Undo 1",amount:1,door_location:state.doorLocation,staff_name:u.name});must(r.data,r.error);g.checked_in_count=newCount;render()})}
function toggleGuest(id){const g=state.guests.find(x=>x.id===id);if(!g)return;if(guestRemaining(g)>0)checkInOneGuest(id);else undoOneGuest(id)}
async function createGroup(e){e.preventDefault();if(!requirePerm("manage"))return;const f=new FormData(e.target),date=String(f.get("date")||state.activeDate);await loadDataForDate(date);const payload={service_day_id:state.serviceDay.id,name:String(f.get("name")||"").trim(),group_type:String(f.get("group_type")||"Bottle Service"),host_name:String(f.get("host_name")||"").trim(),table_location:String(f.get("table_location")||"").trim(),approved_by:String(f.get("approved_by")||"Management").trim(),notes:String(f.get("notes")||"").trim(),status:String(f.get("status")||"Active")};if(!payload.name){alert("Group name is required.");return}await runDb("Create group",async()=>{const r=await db.from("groups").insert(payload).select("*").single();const group=must(r.data,r.error);state.selectedGroupId=group.id;state.currentMode="GROUP";state.modal=null;await loadDataForDate(date)})}
async function updateGroup(e){e.preventDefault();if(!requirePerm("manage"))return;const group=state.groups.find(x=>x.id===state.editingGroupId);if(!group)return;const f=new FormData(e.target),payload={name:String(f.get("name")||"").trim(),group_type:String(f.get("group_type")||"Bottle Service"),host_name:String(f.get("host_name")||"").trim(),table_location:String(f.get("table_location")||"").trim(),approved_by:String(f.get("approved_by")||"Management").trim(),notes:String(f.get("notes")||"").trim(),status:String(f.get("status")||"Active")};if(!payload.name){alert("Group name is required.");return}await runDb("Update group",async()=>{const r=await db.from("groups").update(payload).eq("id",group.id);must(r.data,r.error);state.modal=null;state.editingGroupId=null;await loadDataForDate(state.activeDate)})}

function parseCsv(text){const rows=[];let row=[],cell="",quote=false;for(let i=0;i<text.length;i++){const c=text[i],n=text[i+1];if(c=='"'&&quote&&n=='"'){cell+='"';i++}else if(c=='"')quote=!quote;else if(c===","&&!quote){row.push(cell);cell=""}else if((c==="\n"||c==="\r")&&!quote){if(c==="\r"&&n==="\n")i++;row.push(cell);rows.push(row);row=[];cell=""}else cell+=c}if(cell||row.length){row.push(cell);rows.push(row)}const headers=rows.shift()||[];return rows.filter(r=>r.some(c=>String(c||"").trim()!=="")).map(r=>{const o={};headers.forEach((h,i)=>o[h]=r[i]||"");return o})}

function renderGuestModal(){const g=state.editingGuestId?state.guests.find(x=>x.id===state.editingGuestId):null,is=!!g;return `<div class="modal-backdrop" onclick="if(event.target.classList.contains('modal-backdrop')) closeModal()"><div class="modal"><h2>${is?"Edit Name":"Add Name"}</h2><form onsubmit="${is?"updateGuest(event)":"createGuest(event)"}" class="form two">${!is?`<div style="grid-column:1/-1;"><label>Add To</label><select name="target"><option value="general">General Guest List / Individual Guest</option><option value="selected">Selected Group</option></select></div>`:""}<div><label>First Name</label><input name="first_name" value="${esc(g?.first_name||"")}" /></div><div><label>Last Name</label><input name="last_name" value="${esc(g?.last_name||"")}" /></div><div><label>Guest Type</label><select name="guest_type">${guestTypes.map(t=>`<option ${t===(g?.guest_type||"Guest")?"selected":""}>${esc(t)}</option>`).join("")}</select></div><div><label>Total Allowed / Party Size</label><input name="total_allowed" type="number" min="1" value="${guestTotal(g||{total_allowed:1})}" /></div>${!is?`<div><label style="display:flex;align-items:center;gap:8px;margin-top:30px;"><input style="width:auto;" type="checkbox" name="checked_in" /> Already checked in</label></div>`:`<div></div>`}<div style="grid-column:1/-1;"><label>Notes</label><textarea name="notes" rows="3">${esc(g?.notes||"")}</textarea></div><div style="grid-column:1/-1;" class="row-actions"><button class="btn" type="submit">${is?"Save Name":"Add Name"}</button><button class="btn secondary" type="button" onclick="closeModal()">Cancel</button></div></form></div></div>`}
function renderBulkModal(){const group=selectedGroup();return `<div class="modal-backdrop" onclick="if(event.target.classList.contains('modal-backdrop')) closeModal()"><div class="modal"><h2>Bulk Paste Names</h2><p class="subtle">Paste one name per line. Supports plus counts like Sarah Johnson +2.</p><div class="notice warn"><strong>Examples:</strong><br>John Smith<br>Sarah Johnson +2<br>David Miller - VIP - Owner approved</div><form onsubmit="bulkAddNames(event)" class="form"><div class="form two"><div><label>Add To</label><select name="target"><option value="general">General Guest List / Individual Guest</option><option value="selected">Selected Group${group?` — ${esc(group.name)}`:""}</option></select></div><div><label>Default Guest Type</label><select name="defaultType">${guestTypes.map(t=>`<option ${t==="Guest"?"selected":""}>${esc(t)}</option>`).join("")}</select></div></div><div><label>Paste Names</label><textarea name="bulkNames" rows="12" placeholder="John Smith&#10;Sarah Johnson +2&#10;David Miller - VIP - Owner approved"></textarea></div><div class="row-actions"><button class="btn" type="submit">Add Names</button><button class="btn secondary" type="button" onclick="closeModal()">Cancel</button></div></form></div></div>`}
function renderModal(){if(state.modal==="group")return renderGroupModal();if(state.modal==="guest")return renderGuestModal();if(state.modal==="bulk")return renderBulkModal();return""}
function renderApp(){let content="";if(state.view==="door")content=renderMainWorkspace(false);if(state.view==="manage")content=renderManagement();if(state.view==="reports")content=renderReports();return `${renderTopbar()}<div class="page">${state.error?`<div class="notice redbox"><strong>Error:</strong> ${esc(state.error)}</div>`:""}<div class="notice greenbox"><strong>Live database mode:</strong> guests and check-ins are now stored in Supabase and should sync across devices.</div>${renderTabs()}${content}</div>${renderModal()}`}
Object.assign(window,{login,logout,switchView,setActiveDay,setActiveDate,selectGroup,setMode,checkInOneGuest,undoOneGuest,toggleGuest,createGroup,updateGroup,deleteGroup,createGuest,updateGuest,deleteGuest,clearGeneralGuestList,bulkAddNames,handleFileUpload,exportCsv,openGroupModal,openGuestModal,openBulkPasteModal,closeModal,render});
render();initAuth();
