<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DoorFlow</title>

  <!-- Used only for Excel/CSV uploads in this demo. -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

  <style>
    :root {
      --bg:#f5f6f8;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --dark:#111827;
      --green-bg:#ecfdf5;
      --green:#047857;
      --green-line:#a7f3d0;
      --amber-bg:#fffbeb;
      --amber:#b45309;
      --amber-line:#fde68a;
      --red-bg:#fef2f2;
      --red:#b91c1c;
      --red-line:#fecaca;
      --blue-bg:#eff6ff;
      --blue:#1d4ed8;
      --purple-bg:#f5f3ff;
      --purple:#6d28d9;
      --cyan-bg:#ecfeff;
      --cyan:#0e7490;
      --orange-bg:#fff7ed;
      --orange:#c2410c;
      --shadow:0 10px 24px rgba(15,23,42,.08);
      --radius:22px;
    }

    * { box-sizing:border-box; }

    body {
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    button, input, select, textarea { font-family:inherit; }
    button { cursor:pointer; }
    h1,h2,h3 { letter-spacing:-.03em; }
    .hidden { display:none!important; }

    .topbar {
      position:sticky;
      top:0;
      z-index:20;
      background:rgba(255,255,255,.96);
      border-bottom:1px solid var(--line);
      backdrop-filter:blur(10px);
    }

    .topbar-inner {
      max-width:1380px;
      margin:0 auto;
      padding:16px 18px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
    }

    .brand {
      display:flex;
      gap:12px;
      align-items:center;
    }

    .logo {
      width:46px;
      height:46px;
      border-radius:16px;
      background:var(--dark);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
    }

    .brand h1 { margin:0; font-size:22px; }
    .brand p { margin:3px 0 0; color:var(--muted); font-size:13px; }

    .top-actions {
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .pill {
      border:1px solid var(--line);
      background:#fff;
      border-radius:999px;
      padding:8px 12px;
      color:var(--muted);
      font-size:13px;
    }

    .page {
      max-width:1380px;
      margin:0 auto;
      padding:24px 18px 40px;
    }

    .grid {
      display:grid;
      grid-template-columns:minmax(0,1fr) 430px;
      gap:22px;
      align-items:start;
    }

    .stack { display:grid; gap:16px; }

    .card {
      background:var(--card);
      border:1px solid #eef0f3;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:20px;
    }

    .card.tight { padding:14px; }
    .card h2,.card h3 { margin:0 0 6px; }

    .subtle {
      color:var(--muted);
      font-size:14px;
      line-height:1.45;
      margin:0 0 16px;
    }

    .divider {
      height:1px;
      background:var(--line);
      margin:16px 0;
    }

    .btn {
      border:none;
      background:var(--dark);
      color:#fff;
      padding:11px 15px;
      border-radius:14px;
      font-weight:700;
      transition:.16s ease;
    }

    .btn:hover { background:#1f2937; }

    .btn.secondary {
      background:#fff;
      color:var(--dark);
      border:1px solid var(--line);
    }

    .btn.secondary:hover { background:#f9fafb; }

    .btn.danger {
      background:var(--red-bg);
      color:var(--red);
      border:1px solid var(--red-line);
    }

    .btn.green {
      background:var(--green-bg);
      color:var(--green);
      border:1px solid var(--green-line);
    }

    .btn.small {
      padding:8px 10px;
      border-radius:12px;
      font-size:13px;
    }

    input,select,textarea {
      width:100%;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px 13px;
      font-size:15px;
      outline:none;
      background:#fff;
    }

    input:focus,select:focus,textarea:focus {
      border-color:#111827;
      box-shadow:0 0 0 3px rgba(17,24,39,.12);
    }

    label {
      display:block;
      font-size:13px;
      font-weight:700;
      color:#374151;
      margin-bottom:6px;
    }

    .form { display:grid; gap:12px; }
    .two { grid-template-columns:1fr 1fr; }
    .three { grid-template-columns:1fr 1fr 1fr; }

    .auth {
      max-width:560px;
      margin:48px auto;
    }

    .notice {
      border-radius:16px;
      padding:13px 14px;
      font-size:14px;
      line-height:1.45;
      margin-bottom:14px;
    }

    .warn {
      background:var(--amber-bg);
      color:var(--amber);
      border:1px solid var(--amber-line);
    }

    .redbox {
      background:var(--red-bg);
      color:var(--red);
      border:1px solid var(--red-line);
    }

    .greenbox {
      background:var(--green-bg);
      color:var(--green);
      border:1px solid var(--green-line);
    }

    .tabs {
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin:0 0 16px;
    }

    .tab {
      border:1px solid var(--line);
      background:#fff;
      color:var(--dark);
      padding:10px 13px;
      border-radius:999px;
      font-weight:800;
    }

    .tab.active {
      background:var(--dark);
      color:#fff;
      border-color:var(--dark);
    }

    .datebar {
      display:grid;
      grid-template-columns:180px 180px minmax(0,1fr) 180px;
      gap:10px;
      align-items:end;
      margin-bottom:18px;
    }

    .stats {
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:12px;
      margin-bottom:18px;
    }

    .stat {
      background:#fff;
      border:1px solid #eef0f3;
      border-radius:18px;
      padding:14px;
      box-shadow:0 8px 18px rgba(15,23,42,.05);
    }

    .stat span {
      display:block;
      color:var(--muted);
      font-size:12px;
      margin-bottom:5px;
    }

    .stat strong {
      font-size:26px;
      letter-spacing:-.04em;
    }

    .toolbar {
      display:grid;
      grid-template-columns:minmax(0,1fr) 170px 170px 170px;
      gap:10px;
      margin-bottom:18px;
    }

    .scroll-panel {
      max-height:465px;
      overflow-y:auto;
      padding-right:6px;
    }

    .scroll-panel.short { max-height:315px; }

    .party-list { display:grid; gap:10px; }

    .party-card {
      border:1px solid #eef0f3;
      background:#fff;
      border-radius:20px;
      padding:14px;
      cursor:pointer;
      transition:.16s;
    }

    .party-card:hover {
      transform:translateY(-1px);
      box-shadow:0 10px 22px rgba(15,23,42,.08);
    }

    .party-card.selected { border-color:#111827; }
    .party-card.complete { border-color:var(--green-line); background:#fbfffd; }
    .party-card.started { border-color:var(--amber-line); }

    .party-title {
      margin:0 0 6px;
      font-size:18px;
    }

    .party-meta {
      display:flex;
      flex-wrap:wrap;
      gap:7px;
      margin:8px 0;
    }

    .attendee-list { display:grid; gap:10px; }

    .attendee-row {
      display:grid;
      grid-template-columns:42px minmax(0,1fr) auto;
      gap:12px;
      align-items:center;
      padding:12px;
      border:1px solid #eef0f3;
      border-radius:18px;
      background:#fff;
    }

    .attendee-row.checked {
      background:var(--green-bg);
      border-color:var(--green-line);
    }

    .attendee-check {
      width:28px;
      height:28px;
      border-radius:9px;
      border:2px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
      background:#fff;
      color:#fff;
    }

    .attendee-row.checked .attendee-check {
      background:var(--green);
      border-color:var(--green);
      color:#fff;
    }

    .attendee-name {
      margin:0;
      font-weight:800;
      font-size:16px;
    }

    .attendee-detail {
      margin:2px 0 0;
      color:var(--muted);
      font-size:13px;
    }

    .badges {
      display:flex;
      flex-wrap:wrap;
      gap:7px;
    }

    .badge {
      border:1px solid var(--line);
      border-radius:999px;
      padding:5px 9px;
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }

    .general { background:#f3f4f6; color:#374151; }
    .vip { background:var(--purple-bg); color:var(--purple); border-color:#ddd6fe; }
    .bottle { background:var(--blue-bg); color:var(--blue); border-color:#bfdbfe; }
    .private { background:var(--cyan-bg); color:var(--cyan); border-color:#a5f3fc; }
    .remaining { background:var(--amber-bg); color:var(--amber); border-color:var(--amber-line); }
    .in { background:var(--green-bg); color:var(--green); border-color:var(--green-line); }
    .blocked { background:var(--red-bg); color:var(--red); border-color:var(--red-line); }
    .vendor { background:var(--orange-bg); color:var(--orange); border-color:#fed7aa; }
    .staff { background:var(--cyan-bg); color:var(--cyan); border-color:#a5f3fc; }

    .row-actions {
      display:flex;
      gap:6px;
      flex-wrap:wrap;
    }

    table {
      width:100%;
      border-collapse:collapse;
      font-size:14px;
    }

    th,td {
      padding:10px 8px;
      border-bottom:1px solid var(--line);
      text-align:left;
      vertical-align:top;
    }

    th {
      color:var(--muted);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.04em;
    }

    .modal-backdrop {
      position:fixed;
      inset:0;
      background:rgba(17,24,39,.52);
      z-index:50;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }

    .modal {
      max-width:800px;
      width:100%;
      max-height:92vh;
      overflow:auto;
      background:#fff;
      border-radius:26px;
      box-shadow:0 22px 60px rgba(0,0,0,.22);
      padding:22px;
    }

    @media(max-width:1080px) {
      .grid { grid-template-columns:1fr; }
      .stats { grid-template-columns:repeat(2,1fr); }
      .datebar,.toolbar { grid-template-columns:1fr; }
      .two,.three { grid-template-columns:1fr; }
      .topbar-inner { align-items:flex-start; flex-direction:column; }
      .top-actions { justify-content:flex-start; }
      .attendee-row { grid-template-columns:42px minmax(0,1fr); }
      .attendee-row .row-actions { grid-column:1/-1; }
    }
  </style>
</head>

<body>
<div id="app"></div>

<script>
const STORAGE_KEY = "doorflow_clean_party_guestlist_v1";

const roles = {
  admin:   { label:"Admin",      door:true,  manage:true,  users:true,  reports:true,  key:true },
  manager: { label:"Management", door:true,  manage:true,  users:true,  reports:true,  key:true },
  door:    { label:"Door Staff", door:true,  manage:false, users:false, reports:false, key:false },
  viewer:  { label:"Viewer",     door:false, manage:false, users:false, reports:true,  key:false }
};

const partyTypes = ["General Guest List", "Bottle Service", "VIP Party", "Private Party", "Staff Party", "Vendor Group"];
const attendeeTypes = ["Guest", "VIP", "Comp", "Host", "Birthday", "Bottle Service", "Staff", "Vendor", "Do Not Admit"];
const days = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

const sortOptions = [
  { value:"LAST_ASC", label:"Last Name A-Z" },
  { value:"LAST_DESC", label:"Last Name Z-A" },
  { value:"FIRST_ASC", label:"First Name A-Z" },
  { value:"FIRST_DESC", label:"First Name Z-A" },
  { value:"UNCHECKED", label:"Unchecked First" },
  { value:"CHECKED", label:"Checked First" }
];

function todayISO() {
  return new Date().toISOString().slice(0,10);
}

function dayNameFromDate(dateString) {
  const date = new Date(dateString + "T12:00:00");
  const jsDay = date.getDay();
  return days[jsDay === 0 ? 6 : jsDay - 1];
}

function nextDateForDay(dayName) {
  const targetIndex = days.indexOf(dayName);
  const today = new Date();
  const currentIndex = today.getDay() === 0 ? 6 : today.getDay() - 1;
  const offset = (targetIndex - currentIndex + 7) % 7;
  const result = new Date(today);
  result.setDate(today.getDate() + offset);
  return result.toISOString().slice(0,10);
}

const fridayDate = nextDateForDay("Friday");
const saturdayDate = nextDateForDay("Saturday");

const defaultState = {
  setup:false,
  siteKey:"",
  currentUserId:null,
  view:"door",
  activeDate: fridayDate,
  activeDay: "Friday",
  selectedPartyId:1,
  users:[],
  parties:[
    { id:1, date:fridayDate, day:"Friday", name:"General Guest List", type:"General Guest List", hostName:"Door List", table:"Front Door", approvedBy:"Management", notes:"Individual guests not tied to a bottle service group.", status:"Active" },
    { id:2, date:fridayDate, day:"Friday", name:"Miller Bottle Service", type:"Bottle Service", hostName:"David Miller", table:"Table 4", approvedBy:"Manager", notes:"Birthday group. Confirm table before sending upstairs.", status:"Active" },
    { id:3, date:saturdayDate, day:"Saturday", name:"General Guest List", type:"General Guest List", hostName:"Door List", table:"Front Door", approvedBy:"Management", notes:"Individual guests not tied to a bottle service group.", status:"Active" },
    { id:4, date:saturdayDate, day:"Saturday", name:"Johnson Bottle Service", type:"Bottle Service", hostName:"Sarah Johnson", table:"Table 2", approvedBy:"Michael", notes:"No cover for listed guests.", status:"Active" }
  ],
  attendees:[
    { id:1, partyId:1, firstName:"Ashley", lastName:"Brown", attendeeType:"VIP", checkedIn:false, checkedInAt:null, checkedInBy:null, door:null, notes:"Owner approved." },
    { id:2, partyId:1, firstName:"Morgan", lastName:"Young", attendeeType:"Comp", checkedIn:false, checkedInAt:null, checkedInBy:null, door:null, notes:"No cover." },
    { id:3, partyId:2, firstName:"David", lastName:"Miller", attendeeType:"Host", checkedIn:false, checkedInAt:null, checkedInBy:null, door:null, notes:"Host." },
    { id:4, partyId:2, firstName:"Rachel", lastName:"Adams", attendeeType:"Guest", checkedIn:false, checkedInAt:null, checkedInBy:null, door:null, notes:"" },
    { id:5, partyId:2, firstName:"Brandon", lastName:"Cole", attendeeType:"Guest", checkedIn:true, checkedInAt:"9:42 PM", checkedInBy:"Sam H.", door:"Front Door", notes:"" },
    { id:6, partyId:4, firstName:"Sarah", lastName:"Johnson", attendeeType:"Host", checkedIn:true, checkedInAt:"9:55 PM", checkedInBy:"Trevor E.", door:"EVE Door", notes:"" },
    { id:7, partyId:4, firstName:"Mike", lastName:"Roberts", attendeeType:"Guest", checkedIn:false, checkedInAt:null, checkedInBy:null, door:null, notes:"" }
  ],
  logs:[]
};

let state = loadState();
let currentMode = "GENERAL"; // GENERAL shows every name for the date; PARTY shows selected group only
let selectedPartyId = state.selectedPartyId || null;
let searchText = "";
let partySearchText = "";
let sortMode = "LAST_ASC";
let doorLocation = "Front Door";
let modal = null;
let editingPartyId = null;
let editingAttendeeId = null;
let importMessage = "";
let setupError = "";
let loginError = "";

function clone(value) {
  return JSON.parse(JSON.stringify(value));
}

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return clone(defaultState);
    return { ...clone(defaultState), ...JSON.parse(saved) };
  } catch {
    return clone(defaultState);
  }
}

function saveState() {
  state.selectedPartyId = selectedPartyId;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function resetDemo() {
  if (!confirm("Reset this demo in this browser? This clears saved demo data.")) return;
  localStorage.removeItem(STORAGE_KEY);
  state = clone(defaultState);
  selectedPartyId = state.selectedPartyId;
  currentMode = "GENERAL";
  searchText = "";
  partySearchText = "";
  modal = null;
  render();
}

function esc(value) {
  return String(value ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function nextId(collection) {
  return collection.reduce((max, item) => Math.max(max, Number(item.id || 0)), 0) + 1;
}

function currentUser() {
  return state.users.find(user => user.id === state.currentUserId) || null;
}

function perms() {
  const user = currentUser();
  return user ? roles[user.role] : null;
}

function requirePerm(permission) {
  const p = perms();
  if (!p || !p[permission]) {
    alert("This account does not have access to that function.");
    return false;
  }
  return true;
}

function timeNow() {
  return new Date().toLocaleTimeString([], { hour:"numeric", minute:"2-digit" });
}

function dateTimeNow() {
  return new Date().toLocaleString([], { month:"short", day:"numeric", hour:"numeric", minute:"2-digit" });
}

function roleLabel(role) {
  return roles[role]?.label || role;
}

function selectedParty() {
  const selected = state.parties.find(party => party.id === selectedPartyId);
  if (selected && !(selected.type === "General Guest List" || selected.name === "General Guest List")) return selected;

  return partiesForActiveDate().find(party => !(party.type === "General Guest List" || party.name === "General Guest List")) || null;
}

function partiesForActiveDate() {
  return state.parties.filter(party => party.date === state.activeDate);
}

function attendeesForParty(partyId) {
  return state.attendees.filter(attendee => attendee.partyId === partyId);
}

function activePartyIds() {
  return partiesForActiveDate().map(party => party.id);
}

function attendeesForActiveDate() {
  const ids = activePartyIds();
  return state.attendees.filter(attendee => ids.includes(attendee.partyId));
}

function getOrCreateGeneralList() {
  let party = state.parties.find(item =>
    item.date === state.activeDate &&
    item.type === "General Guest List" &&
    item.name === "General Guest List"
  );

  if (party) return party;

  party = {
    id: nextId(state.parties),
    date: state.activeDate,
    day: state.activeDay,
    name: "General Guest List",
    type: "General Guest List",
    hostName: "Door List",
    table: "Front Door",
    approvedBy: "Management",
    notes: "Individual guests not tied to a bottle service group.",
    status: "Active"
  };

  state.parties.unshift(party);
  saveState();
  return party;
}

function partyStats(partyId) {
  const attendees = attendeesForParty(partyId);
  return {
    total: attendees.length,
    checked: attendees.filter(attendee => attendee.checkedIn).length,
    remaining: attendees.filter(attendee => !attendee.checkedIn).length
  };
}

function dayStats() {
  const attendees = attendeesForActiveDate();
  const parties = partiesForActiveDate();
  return {
    parties: parties.length,
    total: attendees.length,
    checked: attendees.filter(attendee => attendee.checkedIn).length,
    remaining: attendees.filter(attendee => !attendee.checkedIn).length,
    completeParties: parties.filter(party => {
      const s = partyStats(party.id);
      return s.total > 0 && s.remaining === 0;
    }).length
  };
}

function typeClass(type) {
  const value = String(type || "").toLowerCase();
  if (value.includes("bottle")) return "bottle";
  if (value.includes("vip")) return "vip";
  if (value.includes("private")) return "private";
  if (value.includes("do not")) return "blocked";
  if (value.includes("vendor")) return "vendor";
  if (value.includes("staff")) return "staff";
  return "general";
}

function sortAttendees(list) {
  const last = attendee => `${attendee.lastName} ${attendee.firstName}`.toLowerCase();
  const first = attendee => `${attendee.firstName} ${attendee.lastName}`.toLowerCase();

  if (sortMode === "LAST_ASC") return list.sort((a,b) => last(a).localeCompare(last(b)));
  if (sortMode === "LAST_DESC") return list.sort((a,b) => last(b).localeCompare(last(a)));
  if (sortMode === "FIRST_ASC") return list.sort((a,b) => first(a).localeCompare(first(b)));
  if (sortMode === "FIRST_DESC") return list.sort((a,b) => first(b).localeCompare(first(a)));
  if (sortMode === "UNCHECKED") return list.sort((a,b) => Number(a.checkedIn) - Number(b.checkedIn) || last(a).localeCompare(last(b)));
  if (sortMode === "CHECKED") return list.sort((a,b) => Number(b.checkedIn) - Number(a.checkedIn) || last(a).localeCompare(last(b)));

  return list;
}

function visibleAttendees() {
  const source = currentMode === "GENERAL"
    ? attendeesForActiveDate()
    : selectedParty()
      ? attendeesForParty(selectedParty().id)
      : [];

  const query = searchText.trim().toLowerCase();

  const filtered = source.filter(attendee => {
    const party = state.parties.find(item => item.id === attendee.partyId);
    const partyText = party ? `${party.name} ${party.type} ${party.hostName}` : "";
    return !query || `${attendee.firstName} ${attendee.lastName} ${attendee.attendeeType} ${attendee.notes} ${partyText}`.toLowerCase().includes(query);
  });

  return sortAttendees(filtered);
}

function visibleParties() {
  const query = partySearchText.trim().toLowerCase();

  return partiesForActiveDate().filter(party => {
    return !query || `${party.name} ${party.type} ${party.hostName} ${party.table} ${party.notes}`.toLowerCase().includes(query);
  });
}

/* SETUP / LOGIN */

function setupSystem(event) {
  event.preventDefault();
  setupError = "";

  const form = new FormData(event.target);
  const name = String(form.get("name") || "").trim();
  const username = String(form.get("username") || "").trim();
  const pin = String(form.get("pin") || "").trim();
  const siteKey = String(form.get("siteKey") || "").trim();

  if (!name || !username || !pin || !siteKey) {
    setupError = "All setup fields are required.";
    render();
    return;
  }

  state.setup = true;
  state.siteKey = siteKey;
  state.users = [
    { id:1, name, username, pin, role:"admin", active:true, createdAt:dateTimeNow() },
    { id:2, name:"Sample Door Staff", username:"door", pin:"1234", role:"door", active:true, createdAt:dateTimeNow() }
  ];
  state.currentUserId = 1;

/* IMPORT */

function normalizeHeader(value) {
  return String(value || "").trim().toLowerCase().replace(/[^a-z0-9]/g, "");
}

function readField(row, names) {
  const normalized = {};
  Object.keys(row).forEach(key => normalized[normalizeHeader(key)] = row[key]);

  for (const name of names) {
    const value = normalized[normalizeHeader(name)];
    if (value !== undefined && value !== null && String(value).trim() !== "") {
      return String(value).trim();
    }
  }

  return "";
}

function splitFullName(fullName) {
  const parts = String(fullName || "").trim().split(/\s+/).filter(Boolean);
  if (parts.length === 0) return { firstName:"", lastName:"" };
  if (parts.length === 1) return { firstName:parts[0], lastName:"" };
  return { firstName:parts.slice(0,-1).join(" "), lastName:parts[parts.length - 1] };
}

function parseCsv(text) {
  const rows = [];
  let row = [];
  let cell = "";
  let quote = false;

  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    const next = text[i+1];

    if (char === '"' && quote && next === '"') {
      cell += '"';
      i++;
    } else if (char === '"') {
      quote = !quote;
    } else if (char === "," && !quote) {
      row.push(cell);
      cell = "";
    } else if ((char === "\n" || char === "\r") && !quote) {
      if (char === "\r" && next === "\n") i++;
      row.push(cell);
      rows.push(row);
      row = [];
      cell = "";
    } else {
      cell += char;
    }
  }

  if (cell || row.length) {
    row.push(cell);
    rows.push(row);
  }

  const headers = rows.shift() || [];

  return rows
    .filter(row => row.some(cell => String(cell || "").trim() !== ""))
    .map(row => {
      const object = {};
      headers.forEach((header, index) => object[header] = row[index] || "");
      return object;
    });
}

function attendeeFromRow(row, partyId) {
  let firstName = readField(row, ["First Name", "First", "FName"]);
  let lastName = readField(row, ["Last Name", "Last", "LName", "Surname"]);
  const fullName = readField(row, ["Name", "Full Name", "Guest Name", "Attendee Name"]);

  if ((!firstName || !lastName) && fullName) {
    const split = splitFullName(fullName);
    firstName = firstName || split.firstName;
    lastName = lastName || split.lastName;
  }

  return {
    id: nextId(state.attendees),
    partyId,
    firstName,
    lastName,
    attendeeType: readField(row, ["Attendee Type", "Guest Type", "Type", "Category"]) || "Guest",
    checkedIn:false,
    checkedInAt:null,
    checkedInBy:null,
    door:null,
    notes: readField(row, ["Notes", "Note", "Comments", "Details"])
  };
}

function importRows(rows, targetMode) {
  if (!requirePerm("manage")) return;

  let party = targetMode === "general" ? getOrCreateGeneralList() : selectedParty();

  if (!party) {
    importMessage = "Select or create a party first.";
    render();
    return;
  }

  const valid = [];
  const skipped = [];

  rows.forEach((row, index) => {
    const attendee = attendeeFromRow(row, party.id);
    if (!attendee.firstName || !attendee.lastName) {
      skipped.push(index + 2);
      return;
    }
    attendee.id = nextId([...state.attendees, ...valid]);
    valid.push(attendee);
  });

  if (!valid.length) {
    importMessage = "No valid names found. Use First Name / Last Name, or Full Name.";
    render();
    return;
  }

  state.attendees = [...valid, ...state.attendees];
  importMessage = `Imported ${valid.length} name${valid.length === 1 ? "" : "s"} into ${party.name}. ${skipped.length ? `Skipped ${skipped.length} row${skipped.length === 1 ? "" : "s"} missing names.` : ""}`;
  selectedPartyId = party.id;
  saveState();
  render();
}

function handleFileUpload(event) {
  if (!requirePerm("manage")) return;

  const targetMode = document.getElementById("uploadTarget")?.value || "selected";
  const file = event.target.files && event.target.files[0];

  if (!file) return;

  const extension = file.name.split(".").pop().toLowerCase();
  const reader = new FileReader();

  reader.onerror = function () {
    importMessage = "The file could not be read. Try saving it again as .xlsx or .csv.";
    render();
  };

  reader.onload = function (loadEvent) {
    try {
      let rows = [];

      if (extension === "csv") {
        rows = parseCsv(String(loadEvent.target.result || ""));
      } else {
        if (typeof XLSX === "undefined") {
          importMessage = "Excel reader did not load. Try CSV instead, or check internet connection.";
          render();
          return;
        }

        const workbook = XLSX.read(loadEvent.target.result, { type:"array" });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        rows = XLSX.utils.sheet_to_json(sheet, { defval:"" });
      }

      importRows(rows, targetMode);
      event.target.value = "";
    } catch (error) {
      console.error(error);
      importMessage = "Import failed. First row should include First Name / Last Name, or Full Name.";
      render();
    }
  };

  if (extension === "csv") reader.readAsText(file);
  else reader.readAsArrayBuffer(file);
}


/* BULK PASTE IMPORT */

function parseBulkNames(text) {
  return String(text || "")
    .split(/\r?\n/)
    .map(line => line.trim())
    .filter(Boolean)
    .map(line => {
      // Supports:
      // John Smith
      // Smith, John
      // John Smith - VIP - Notes
      // John Smith, VIP, Notes
      let cleanLine = line.replace(/\t+/g, " ").trim();
      let parts = [];

      if (cleanLine.includes(" - ")) {
        parts = cleanLine.split(" - ").map(part => part.trim());
      } else if (cleanLine.includes(",")) {
        parts = cleanLine.split(",").map(part => part.trim());
      } else {
        parts = [cleanLine];
      }

      let namePart = parts[0] || "";
      let attendeeType = parts[1] || "Guest";
      let notes = parts.slice(2).join(" - ");

      let firstName = "";
      let lastName = "";

      if (namePart.includes(",")) {
        const namePieces = namePart.split(",").map(piece => piece.trim()).filter(Boolean);
        lastName = namePieces[0] || "";
        firstName = namePieces.slice(1).join(" ") || "";
      } else {
        const namePieces = namePart.split(/\s+/).filter(Boolean);
        if (namePieces.length === 1) {
          firstName = namePieces[0];
          lastName = "";
        } else {
          firstName = namePieces.slice(0, -1).join(" ");
          lastName = namePieces[namePieces.length - 1];
        }
      }

      return { firstName, lastName, attendeeType, notes };
    });
}

function bulkAddNames(event) {
  event.preventDefault();
  if (!requirePerm("manage")) return;

  const form = new FormData(event.target);
  const target = String(form.get("target") || "general");
  const bulkText = String(form.get("bulkNames") || "").trim();
  const defaultType = String(form.get("defaultType") || "Guest");

  if (!bulkText) {
    alert("Paste at least one name first.");
    return;
  }

  const party = target === "general" ? getOrCreateGeneralList() : selectedParty();

  if (!party) {
    alert("Select or create a party first.");
    return;
  }

  const parsed = parseBulkNames(bulkText);
  const valid = [];
  const skipped = [];

  parsed.forEach((item, index) => {
    if (!item.firstName || !item.lastName) {
      skipped.push(index + 1);
      return;
    }

    valid.push({
      id: nextId([...state.attendees, ...valid]),
      partyId: party.id,
      firstName: item.firstName,
      lastName: item.lastName,
      attendeeType: item.attendeeType && item.attendeeType !== "Guest" ? item.attendeeType : defaultType,
      checkedIn: false,
      checkedInAt: null,
      checkedInBy: null,
      door: null,
      notes: item.notes || ""
    });
  });

  if (!valid.length) {
    alert("No valid names found. Use one full name per line, like: John Smith");
    return;
  }

  state.attendees = [...valid, ...state.attendees];
  selectedPartyId = party.id;
  currentMode = target === "general" ? "GENERAL" : "PARTY";
  importMessage = `Bulk added ${valid.length} name${valid.length === 1 ? "" : "s"} into ${party.name}. ${skipped.length ? `Skipped ${skipped.length} line${skipped.length === 1 ? "" : "s"} missing first/last name.` : ""}`;
  modal = null;
  saveState();
  render();
}

        party?.date || "",
        party?.day || "",
        party?.name || "",
        party?.type || "",
        party?.hostName || "",
        party?.table || "",
        attendee.firstName,
        attendee.lastName,
        attendee.attendeeType,
        attendee.checkedIn ? "Yes" : "No",
        attendee.checkedInAt || "",
        attendee.checkedInBy || "",
        attendee.door || "",
        attendee.notes || ""
      ];
    })
  ];

  const csv = rows.map(row => row.map(value => `"${String(value).replaceAll('"','""')}"`).join(",")).join("\n");
  const blob = new Blob([csv], { type:"text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");

  link.href = url;
  link.download = `doorflow_${state.activeDate}.csv`;
  link.click();

  URL.revokeObjectURL(url);

          <label>Day</label>
          <select onchange="setActiveDay(this.value)">
            ${days.map(day => `<option ${day === state.activeDay ? "selected" : ""}>${day}</option>`).join("")}
          </select>
        </div>

        <div>
          <label>Calendar Date</label>
          <input type="date" value="${esc(state.activeDate)}" onchange="setActiveDate(this.value)" />
        </div>

        <div>
          <label>Selected Party / Group</label>
          <select onchange="selectParty(this.value)">
            ${partiesForActiveDate().filter(item => !(item.type === "General Guest List" || item.name === "General Guest List")).length
              ? partiesForActiveDate()
                  .filter(item => !(item.type === "General Guest List" || item.name === "General Guest List"))
                  .map(item => `<option value="${item.id}" ${item.id === party?.id ? "selected" : ""}>${esc(item.name)} — ${esc(item.hostName || item.type)}</option>`).join("")
              : `<option>No specific parties for this date</option>`
            }
          </select>
        </div>

        <div>
          <label>Door Location</label>
          <select onchange="doorLocation=this.value;render()">
            ${["Front Door","Rear Door","EVE Door","VIP Check-In"].map(option => `<option ${option === doorLocation ? "selected" : ""}>${option}</option>`).join("")}
          </select>
        </div>
      </div>
    </div>
  `;
}

function renderStats() {
  const s = dayStats();

  return `
    <div class="stats">
      <div class="stat"><span>Groups</span><strong>${s.parties}</strong></div>
      <div class="stat"><span>Complete Groups</span><strong>${s.completeParties}</strong></div>
      <div class="stat"><span>Total Names</span><strong>${s.total}</strong></div>
      <div class="stat"><span>Checked In</span><strong>${s.checked}</strong></div>
      <div class="stat"><span>Still Remaining</span><strong>${s.remaining}</strong></div>
    </div>
  `;
}

function renderPartyList(showActions = false) {
  const allParties = visibleParties();
  const day = dayStats();
  const realGeneralParty = allParties.find(party => party.type === "General Guest List" || party.name === "General Guest List");
  const bottleAndSpecialParties = allParties.filter(party => !(party.type === "General Guest List" || party.name === "General Guest List"));

  const generalCard = `
    <div class="party-card ${currentMode === "GENERAL" ? "selected" : ""}" onclick="setMode('GENERAL')">
      <h3 class="party-title">General Guest List</h3>

      <div class="party-meta">
        <span class="badge general">Master List</span>
        <span class="badge in">${day.checked} in</span>
        <span class="badge remaining">${day.remaining} left</span>
      </div>

      <p class="subtle" style="margin:0;">Shows every name for ${esc(state.activeDay)} ${esc(state.activeDate)}, including individual guests, bottle service, and party attendees.</p>

      ${showActions && realGeneralParty ? `
        <div class="row-actions" style="margin-top:10px;">
          <button class="btn secondary small" onclick="event.stopPropagation(); openPartyModal(${realGeneralParty.id})">Edit</button>
        </div>
      ` : ""}
    </div>
  `;

  if (!bottleAndSpecialParties.length) {
    return `
      <div class="party-list">
        ${generalCard}
        <div class="notice warn">No bottle service or special party groups are scheduled for ${esc(state.activeDay)} ${esc(state.activeDate)}.</div>
      </div>
    `;
  }

  return `
    <div class="party-list">
      ${generalCard}

      ${bottleAndSpecialParties.map(party => {
        const s = partyStats(party.id);
        const complete = s.total > 0 && s.remaining === 0;
        const started = s.checked > 0 && s.remaining > 0;

        return `
          <div class="party-card ${currentMode === "PARTY" && party.id === selectedParty()?.id ? "selected" : ""} ${complete ? "complete" : started ? "started" : ""}" onclick="selectParty(${party.id})">
            <h3 class="party-title">${esc(party.name)}</h3>

            <div class="party-meta">
              <span class="badge ${typeClass(party.type)}">${esc(party.type)}</span>
              <span class="badge general">Host: ${esc(party.hostName || "N/A")}</span>
              ${party.table ? `<span class="badge general">${esc(party.table)}</span>` : ""}
              <span class="badge in">${s.checked} in</span>
              <span class="badge remaining">${s.remaining} left</span>
            </div>

            <p class="subtle" style="margin:0;">${esc(party.notes || "No notes listed.")}</p>

            ${showActions ? `
              <div class="row-actions" style="margin-top:10px;">
                <button class="btn secondary small" onclick="event.stopPropagation(); openPartyModal(${party.id})">Edit</button>
                <button class="btn danger small" onclick="event.stopPropagation(); deleteParty(${party.id})">Delete</button>
              </div>
            ` : ""}
          </div>
        `;
      }).join("")}
    </div>
  `;
}

function renderAttendeeList(showActions = false) {
  const attendees = visibleAttendees();

  if (!attendees.length) {
    return `<div class="notice warn">No names found for the selected view.</div>`;
  }

  return `
    <div class="attendee-list">
      ${attendees.map(attendee => {
        const party = state.parties.find(item => item.id === attendee.partyId);

        return `
          <div class="attendee-row ${attendee.checkedIn ? "checked" : ""}">
            <button class="attendee-check" onclick="toggleAttendee(${attendee.id})">${attendee.checkedIn ? "✓" : ""}</button>

            <div>
              <p class="attendee-name">${esc(attendee.firstName)} ${esc(attendee.lastName)}</p>
              <p class="attendee-detail">
                ${esc(attendee.attendeeType)}
                ${party ? ` · ${esc(party.name)}` : ""}
                ${attendee.notes ? ` · ${esc(attendee.notes)}` : ""}
                ${attendee.checkedIn ? ` · Checked in at ${esc(attendee.checkedInAt)} by ${esc(attendee.checkedInBy)} at ${esc(attendee.door)}` : ""}
              </p>
            </div>

            <div class="row-actions">
              ${showActions ? `
                <button class="btn secondary small" onclick="openAttendeeModal(${attendee.id})">Edit</button>
                <button class="btn danger small" onclick="deleteAttendee(${attendee.id})">Delete</button>
              ` : ""}
            </div>
          </div>
        `;
      }).join("")}
    </div>
  `;
}

function renderSelectedPartyPanel() {
  const party = selectedParty();

  if (!party) {
    return `
      <div class="card">
        <h2>Selected Group</h2>
        <p class="subtle">No party or guest list selected.</p>
      </div>
    `;
  }

  const s = partyStats(party.id);

  return `
    <div class="card">
      <h2>${esc(party.name)}</h2>
      <p class="subtle">${esc(party.type)} · Host: ${esc(party.hostName || "N/A")}</p>

      <div class="stats" style="grid-template-columns:repeat(3,1fr);margin-bottom:0;">
        <div class="stat"><span>Total</span><strong>${s.total}</strong></div>
        <div class="stat"><span>In</span><strong>${s.checked}</strong></div>
        <div class="stat"><span>Left</span><strong>${s.remaining}</strong></div>
      </div>

      <div class="divider"></div>

      <p class="subtle"><strong>Table/Location:</strong> ${esc(party.table || "Not listed")}</p>
      <p class="subtle"><strong>Approved By:</strong> ${esc(party.approvedBy || "Not listed")}</p>
      <p class="subtle"><strong>Notes:</strong> ${esc(party.notes || "No notes listed.")}</p>

      ${perms().manage ? `
        <div class="row-actions">
          <button class="btn secondary small" onclick="openPartyModal(${party.id})">Edit Group</button>
          <button class="btn danger small" onclick="deleteParty(${party.id})">Delete Group</button>
        </div>
      ` : ""}
    </div>
  `;
}

function renderMainWorkspace(showManagement = false) {
  const title = currentMode === "GENERAL" ? "General Guest List" : `${selectedParty() ? esc(selectedParty().name) : "Selected Group"} Names`;
  const subtitle = currentMode === "GENERAL"
    ? "This is the master list for the selected date. It shows individual guests plus every name attached to bottle service groups and special parties."
    : "This shows only the names under the selected party or group.";

  return `
    ${renderDateBar()}
    ${renderStats()}

    <div class="grid">
      <main class="stack">
        <div class="card tight">
          <div class="toolbar">
            <input placeholder="${currentMode === "GENERAL" ? "Search general guest list..." : "Search selected group..."}" value="${esc(searchText)}" oninput="searchText=this.value;render()" />

            <select onchange="setMode(this.value)">
              <option value="GENERAL" ${currentMode === "GENERAL" ? "selected" : ""}>General Guest List</option>
              <option value="PARTY" ${currentMode === "PARTY" ? "selected" : ""}>Selected Party Only</option>
            </select>

            <select onchange="sortMode=this.value;render()">
              ${sortOptions.map(option => `<option value="${option.value}" ${option.value === sortMode ? "selected" : ""}>${esc(option.label)}</option>`).join("")}
            </select>

            ${showManagement
              ? `<button class="btn" onclick="openAttendeeModal()">Add Individual Guest</button>`
              : `<button class="btn secondary" onclick="searchText='';render()">Clear Search</button>`
            }
          </div>
        </div>

        <div class="card">
          <h2>${title}</h2>
          <p class="subtle">${subtitle}</p>
          <div class="scroll-panel">
            ${renderAttendeeList(showManagement)}
          </div>
        </div>

        ${showManagement ? `
          <div class="card">
            <h2>Bulk Paste Names</h2>
            <p class="subtle">Paste one name per line and add them to the General Guest List or the selected party/group.</p>
            <button class="btn secondary" onclick="openBulkPasteModal()">Open Bulk Paste Tool</button>
          </div>

          <div class="card">
            <h2>Upload Names from Excel / CSV</h2>
            <p class="subtle">Recommended columns: First Name, Last Name, Attendee Type, Notes. Full Name also works.</p>

            ${importMessage ? `<div class="notice ${importMessage.startsWith("Imported") ? "greenbox" : "redbox"}">${esc(importMessage)}</div>` : ""}

            <div class="form two">
              <div>
                <label>Upload Target</label>
                <select id="uploadTarget">
                  <option value="general">General Guest List / Individual Guest</option>
                  <option value="selected">Selected Party / Group</option>
                </select>
              </div>
              <div>
                <label>Excel / CSV File</label>
                <input type="file" accept=".xlsx,.xls,.csv" onchange="handleFileUpload(event)" />
              </div>
            </div>
          </div>
        ` : ""}
      </main>

      <aside class="stack">
        <div class="card">
          <h2>Party / Bottle Service Groups</h2>
          <p class="subtle">Click General Guest List to see everyone for the date, or click a bottle service group to view only that group.</p>
          <input placeholder="Search groups..." value="${esc(partySearchText)}" oninput="partySearchText=this.value;render()" style="margin-bottom:12px;" />
          <div class="scroll-panel short">
            ${renderPartyList(showManagement)}
          </div>
        </div>

        ${renderSelectedPartyPanel()}
      </aside>
    </div>
  `;
}

function renderManagement() {
  return `
    <div class="stack">
      <div class="card">
        <h2>Management Controls</h2>
        <p class="subtle">Create parties, add individual guests to the full guest list, upload names, and edit/delete groups or names.</p>
        <div class="row-actions">
          <button class="btn" onclick="openPartyModal()">Create Party</button>
          <button class="btn secondary" onclick="openAttendeeModal()">Add Individual Guest</button>
          <button class="btn secondary" onclick="openBulkPasteModal()">Bulk Paste Names</button>
          <button class="btn secondary" onclick="setMode('GENERAL')">View General Guest List</button>
          <button class="btn secondary" onclick="exportCsv()">Export Current Day CSV</button>
        </div>
      </div>
      ${renderMainWorkspace(true)}
    </div>
  `;
}

function renderUsers() {
  return `
    <div class="grid">
      <main class="stack">
        <div class="card">
          <h2>Create Staff Account</h2>
          <form onsubmit="createUser(event)" class="form two">
            <div><label>Name</label><input name="name" /></div>
            <div><label>Username</label><input name="username" /></div>
            <div><label>PIN</label><input name="pin" type="password" /></div>
            <div>
              <label>Access Level</label>
              <select name="role">
                <option value="door">Door Staff</option>
                <option value="manager">Management</option>
                <option value="viewer">Viewer</option>
                <option value="admin">Admin</option>
              </select>
            </div>
            <div style="grid-column:1/-1;"><button class="btn">Create Account</button></div>
          </form>
        </div>

        <div class="card">
          <h2>Private Website Access Key</h2>
          <form onsubmit="updatePrivateKey(event)" class="form">
            <div><label>Current Private Key</label><input name="currentKey" type="password" /></div>
            <div><label>New Private Key</label><input name="newKey" type="password" /></div>
            <button class="btn">Update Private Key</button>
          </form>
        </div>
      </main>

      <aside class="stack">
        <div class="card">
          <h2>Current Accounts</h2>
          <table>
            <thead><tr><th>Name</th><th>Role</th><th>Status</th><th></th></tr></thead>
            <tbody>
              ${state.users.map(user => `
                <tr>
                  <td><strong>${esc(user.name)}</strong><br><span class="subtle">${esc(user.username)}</span></td>
                  <td>${roleLabel(user.role)}</td>
                  <td>${user.active ? "Active" : "Inactive"}</td>
                  <td><button class="btn secondary small" onclick="toggleUser(${user.id})">${user.active ? "Deactivate" : "Activate"}</button></td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      </aside>
    </div>
  `;
}

function renderReports() {
  const logs = state.logs.filter(log => activePartyIds().includes(log.partyId));

  return `
    ${renderDateBar()}
    ${renderStats()}

    <div class="grid">
      <main class="stack">
        <div class="card">
          <h2>Reports</h2>
          <p class="subtle">Current date: <strong>${esc(state.activeDay)} ${esc(state.activeDate)}</strong></p>
          <button class="btn" onclick="exportCsv()">Export Current Day CSV</button>
        </div>

        <div class="card">
          <h2>Check-In Activity Log</h2>
          <div class="scroll-panel">
            ${logs.length ? `
              <table>
                <thead><tr><th>Time</th><th>Name</th><th>Action</th><th>Staff</th><th>Door</th></tr></thead>
                <tbody>
                  ${logs.map(log => `
                    <tr>
                      <td>${esc(log.timestamp)}</td>
                      <td>${esc(log.attendeeName)}</td>
                      <td>${esc(log.action)}</td>
                      <td>${esc(log.staffName)}</td>
                      <td>${esc(log.doorLocation)}</td>
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            ` : `<p class="subtle">No check-in activity yet for this date.</p>`}
          </div>
        </div>
      </main>

      <aside class="stack">
        ${renderSelectedPartyPanel()}
      </aside>
    </div>
  `;
}

/* MODALS */

function renderPartyModal() {
  const party = editingPartyId ? state.parties.find(item => item.id === editingPartyId) : null;
  const isEdit = Boolean(party);

  return `
    <div class="modal-backdrop" onclick="if(event.target.classList.contains('modal-backdrop')) closeModal()">
      <div class="modal">
        <h2>${isEdit ? "Edit Party / Group" : "Create Party / Group"}</h2>
        <p class="subtle">${isEdit ? "Update this party or guest-list group." : "Create a bottle service group, VIP party, or other group for a specific date."}</p>

        <form onsubmit="${isEdit ? "updateParty(event)" : "createParty(event)"}" class="form two">
          <div>
            <label>Party / Group Name</label>
            <input name="name" value="${esc(party?.name || "")}" placeholder="Smith Bottle Service" />
          </div>

          <div>
            <label>Type</label>
            <select name="type">
              ${partyTypes.map(type => `<option ${type === (party?.type || "Bottle Service") ? "selected" : ""}>${esc(type)}</option>`).join("")}
            </select>
          </div>

          <div>
            <label>Date</label>
            <input name="date" type="date" value="${esc(party?.date || state.activeDate)}" />
          </div>

          <div>
            <label>Host Name</label>
            <input name="hostName" value="${esc(party?.hostName || "")}" placeholder="Main contact / host" />
          </div>

          <div>
            <label>Table / Location</label>
            <input name="table" value="${esc(party?.table || "")}" placeholder="Table 4 / VIP / Door List" />
          </div>

          <div>
            <label>Approved By</label>
            <input name="approvedBy" value="${esc(party?.approvedBy || "Management")}" />
          </div>

          <div>
            <label>Status</label>
            <select name="status">
              ${["Active","Draft","Closed"].map(status => `<option ${status === (party?.status || "Active") ? "selected" : ""}>${status}</option>`).join("")}
            </select>
          </div>

          <div style="grid-column:1/-1;">
            <label>Notes</label>
            <textarea name="notes" rows="3">${esc(party?.notes || "")}</textarea>
          </div>

          <div style="grid-column:1/-1;" class="row-actions">
            <button class="btn" type="submit">${isEdit ? "Save Group" : "Create Group"}</button>
            <button class="btn secondary" type="button" onclick="closeModal()">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  `;
}

function renderAttendeeModal() {
  const attendee = editingAttendeeId ? state.attendees.find(item => item.id === editingAttendeeId) : null;
  const isEdit = Boolean(attendee);

  return `
    <div class="modal-backdrop" onclick="if(event.target.classList.contains('modal-backdrop')) closeModal()">
      <div class="modal">
        <h2>${isEdit ? "Edit Name" : "Add Name"}</h2>
        <p class="subtle">${isEdit ? "Update this name." : "Add a person to the general guest list or the selected party/group."}</p>

        <form onsubmit="${isEdit ? "updateAttendee(event)" : "createAttendee(event)"}" class="form two">
          ${!isEdit ? `
            <div style="grid-column:1/-1;">
              <label>Add To</label>
              <select name="target">
                <option value="general">General Guest List / Individual Guest</option>
                <option value="selected">Selected Party / Group</option>
              </select>
            </div>
          ` : ""}

          <div><label>First Name</label><input name="firstName" value="${esc(attendee?.firstName || "")}" /></div>
          <div><label>Last Name</label><input name="lastName" value="${esc(attendee?.lastName || "")}" /></div>

          <div>
            <label>Guest Type</label>
            <select name="attendeeType">
              ${attendeeTypes.map(type => `<option ${type === (attendee?.attendeeType || "Guest") ? "selected" : ""}>${esc(type)}</option>`).join("")}
            </select>
          </div>

          ${!isEdit ? `
            <div>
              <label style="display:flex;align-items:center;gap:8px;margin-top:30px;">
                <input style="width:auto;" type="checkbox" name="checkedIn" />
                Already checked in
              </label>
            </div>
          ` : `<div></div>`}

          <div style="grid-column:1/-1;">
            <label>Notes</label>
            <textarea name="notes" rows="3">${esc(attendee?.notes || "")}</textarea>
          </div>

          <div style="grid-column:1/-1;" class="row-actions">
            <button class="btn" type="submit">${isEdit ? "Save Name" : "Add Name"}</button>
            <button class="btn secondary" type="button" onclick="closeModal()">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  `;
}


function renderBulkPasteModal() {
  const party = selectedParty();

  return `
    <div class="modal-backdrop" onclick="if(event.target.classList.contains('modal-backdrop')) closeModal()">
      <div class="modal">
        <h2>Bulk Paste Names</h2>
        <p class="subtle">Paste one name per line. This is useful when management receives a text, email, or simple list of names.</p>

        <div class="notice warn">
          <strong>Accepted examples:</strong><br>
          John Smith<br>
          Smith, John<br>
          John Smith - VIP - Owner approved<br>
          John Smith, VIP, Owner approved
        </div>

        <form onsubmit="bulkAddNames(event)" class="form">
          <div class="form two">
            <div>
              <label>Add To</label>
              <select name="target">
                <option value="general">General Guest List / Individual Guest</option>
                <option value="selected">Selected Party / Group${party ? ` — ${esc(party.name)}` : ""}</option>
              </select>
            </div>

            <div>
              <label>Default Guest Type</label>
              <select name="defaultType">
                ${attendeeTypes.map(type => `<option ${type === "Guest" ? "selected" : ""}>${esc(type)}</option>`).join("")}
              </select>
            </div>
          </div>

          <div>
            <label>Paste Names</label>
            <textarea name="bulkNames" rows="12" placeholder="John Smith&#10;Sarah Johnson&#10;David Miller - VIP - Owner approved"></textarea>
          </div>

          <div class="row-actions">
            <button class="btn" type="submit">Add Names</button>
            <button class="btn secondary" type="button" onclick="closeModal()">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  `;
}


function renderModal() {
  if (modal === "party") return renderPartyModal();
  if (modal === "attendee") return renderAttendeeModal();
  if (modal === "bulkPaste") return renderBulkPasteModal();
  return "";
}

function renderApp() {
  let content = "";

  if (state.view === "door") content = renderMainWorkspace(false);
  if (state.view === "manage") content = renderManagement();
  if (state.view === "users") content = renderUsers();
  if (state.view === "reports") content = renderReports();

  return `
    ${renderTopbar()}
    <div class="page">
      <div class="notice warn">
        <strong>Demo mode:</strong> this version stores data locally in the browser. Real multi-device syncing needs a database later.
      </div>
      ${renderTabs()}
      ${content}
    </div>
    ${renderModal()}
  `;
}

function render() {
  const root = document.getElementById("app");

  if (!state.setup) {
    root.innerHTML = renderSetup();
    return;
  }

  if (!state.currentUserId) {
    root.innerHTML = renderLogin();
    return;
  }

  root.innerHTML = renderApp();
}

Object.assign(window, {
  setupSystem,
  login,
  logout,
  resetDemo,
  switchView,
  setActiveDay,
  setActiveDate,
  selectParty,
  setMode,
  toggleAttendee,
  handleFileUpload,
  createParty,
  updateParty,
  deleteParty,
  createAttendee,
  updateAttendee,
  deleteAttendee,
  createUser,
  toggleUser,
  updatePrivateKey,
  exportCsv,
  openPartyModal,
  openAttendeeModal,
  openBulkPasteModal,
  bulkAddNames,
  closeModal,
  render
});

render();
</script>
</body>
</html>
